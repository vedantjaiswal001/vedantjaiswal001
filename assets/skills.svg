<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8A5C2"/><stop offset="100%" stop-color="#FFD3E0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B39DDB"/><stop offset="100%" stop-color="#D7C5F0"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8FC8E8"/><stop offset="100%" stop-color="#C4E4F7"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7FD8B2"/><stop offset="100%" stop-color="#C6F0DC"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB98A"/><stop offset="100%" stop-color="#FFDFC7"/>
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3D06E"/><stop offset="100%" stop-color="#FBE9B7"/>
    </linearGradient>
  </defs>

  <!-- Cream card -->
  <rect x="2" y="2" width="896" height="416" rx="20" fill="#FFF9F5" stroke="#F0DDE8" stroke-width="2"/>

  <!-- Title -->
  <text x="450" y="48" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#8D7B9E" text-anchor="middle" letter-spacing="2">Skill Garden</text>
  <text x="450" y="70" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#C0A9CE" text-anchor="middle">tended daily, always growing</text>

  <!-- PYTHON -->
  <text x="50" y="118" font-family="Verdana, sans-serif" font-size="15" font-weight="bold" fill="#7A6B8A">Python</text>
  <rect x="230" y="104" width="560" height="16" rx="8" fill="#F5EBF1"/>
  <rect x="230" y="104" width="0" height="16" rx="8" fill="url(#g1)">
    <animate attributeName="width" from="0" to="515" dur="1.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="810" y="117" font-family="Verdana, sans-serif" font-size="13" fill="#B08BA8" opacity="0">92
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- PYTORCH -->
  <text x="50" y="168" font-family="Verdana, sans-serif" font-size="15" font-weight="bold" fill="#7A6B8A">PyTorch</text>
  <rect x="230" y="154" width="560" height="16" rx="8" fill="#F5EBF1"/>
  <rect x="230" y="154" width="0" height="16" rx="8" fill="url(#g2)">
    <animate attributeName="width" from="0" to="476" dur="1.6s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="810" y="167" font-family="Verdana, sans-serif" font-size="13" fill="#B08BA8" opacity="0">85
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.9s" fill="freeze"/>
  </text>

  <!-- TENSORFLOW -->
  <text x="50" y="218" font-family="Verdana, sans-serif" font-size="15" font-weight="bold" fill="#7A6B8A">TensorFlow</text>
  <rect x="230" y="204" width="560" height="16" rx="8" fill="#F5EBF1"/>
  <rect x="230" y="204" width="0" height="16" rx="8" fill="url(#g3)">
    <animate attributeName="width" from="0" to="448" dur="1.6s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="810" y="217" font-family="Verdana, sans-serif" font-size="13" fill="#B08BA8" opacity="0">80
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.2s" fill="freeze"/>
  </text>

  <!-- COMPUTER VISION -->
  <text x="50" y="268" font-family="Verdana, sans-serif" font-size="15" font-weight="bold" fill="#7A6B8A">Computer Vision</text>
  <rect x="230" y="254" width="560" height="16" rx="8" fill="#F5EBF1"/>
  <rect x="230" y="254" width="0" height="16" rx="8" fill="url(#g4)">
    <animate attributeName="width" from="0" to="459" dur="1.6s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="810" y="267" font-family="Verdana, sans-serif" font-size="13" fill="#B08BA8" opacity="0">82
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.5s" fill="freeze"/>
  </text>

  <!-- GENAI / LLMS -->
  <text x="50" y="318" font-family="Verdana, sans-serif" font-size="15" font-weight="bold" fill="#7A6B8A">GenAI &amp; LLMs</text>
  <rect x="230" y="304" width="560" height="16" rx="8" fill="#F5EBF1"/>
  <rect x="230" y="304" width="0" height="16" rx="8" fill="url(#g5)">
    <animate attributeName="width" from="0" to="437" dur="1.6s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="810" y="317" font-family="Verdana, sans-serif" font-size="13" fill="#B08BA8" opacity="0">78
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.8s" fill="freeze"/>
  </text>

  <!-- C++ / DSA -->
  <text x="50" y="368" font-family="Verdana, sans-serif" font-size="15" font-weight="bold" fill="#7A6B8A">C++ &amp; DSA</text>
  <rect x="230" y="354" width="560" height="16" rx="8" fill="#F5EBF1"/>
  <rect x="230" y="354" width="0" height="16" rx="8" fill="url(#g6)">
    <animate attributeName="width" from="0" to="420" dur="1.6s" begin="1.7s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="810" y="367" font-family="Verdana, sans-serif" font-size="13" fill="#B08BA8" opacity="0">75
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.1s" fill="freeze"/>
  </text>

  <!-- Tiny corner blooms -->
  <g transform="translate(46 44)">
    <circle cx="0" cy="-5" r="3.5" fill="#FFD3E0"/><circle cx="4.8" cy="1.5" r="3.5" fill="#C9B6E4"/>
    <circle cx="3" cy="6.8" r="3.5" fill="#B5EAD7"/><circle cx="-3" cy="6.8" r="3.5" fill="#AEE1F9"/>
    <circle cx="-4.8" cy="1.5" r="3.5" fill="#FFDAC1"/><circle cx="0" cy="1.2" r="2.4" fill="#FFF9F5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 46 44" to="360 46 44" dur="16s" repeatCount="indefinite" additive="sum"/>
  </g>
  <g transform="translate(854 44)">
    <circle cx="0" cy="-5" r="3.5" fill="#B5EAD7"/><circle cx="4.8" cy="1.5" r="3.5" fill="#FFD3E0"/>
    <circle cx="3" cy="6.8" r="3.5" fill="#FFDAC1"/><circle cx="-3" cy="6.8" r="3.5" fill="#C9B6E4"/>
    <circle cx="-4.8" cy="1.5" r="3.5" fill="#AEE1F9"/><circle cx="0" cy="1.2" r="2.4" fill="#FFF9F5"/>
    <animateTransform attributeName="transform" type="rotate" from="360 854 44" to="0 854 44" dur="16s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>
