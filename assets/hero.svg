<svg width="1000" height="320" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shifting aurora gradient -->
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E2DE2">
        <animate attributeName="stop-color" values="#8E2DE2;#00D4FF;#FF2D95;#8E2DE2" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#4A00E0">
        <animate attributeName="stop-color" values="#4A00E0;#8E2DE2;#00D4FF;#4A00E0" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00D4FF">
        <animate attributeName="stop-color" values="#00D4FF;#FF2D95;#8E2DE2;#00D4FF" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Neon glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2333" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="320" fill="#0d1117"/>
  <rect width="1000" height="320" fill="url(#grid)"/>

  <!-- Floating orbs -->
  <circle cx="120" cy="70" r="60" fill="#8E2DE2" opacity="0.12">
    <animate attributeName="cy" values="70;110;70" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="60;75;60" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="240" r="80" fill="#00D4FF" opacity="0.10">
    <animate attributeName="cy" values="240;190;240" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="r" values="80;95;80" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="60" r="35" fill="#FF2D95" opacity="0.10">
    <animate attributeName="cx" values="820;860;820" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Rising particles -->
  <g fill="#00D4FF">
    <circle cx="200" cy="300" r="2.5" opacity="0.8">
      <animate attributeName="cy" values="310;-10" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="300" r="2" opacity="0.7">
      <animate attributeName="cy" values="310;-10" dur="8s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="8s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="300" r="3" opacity="0.6" fill="#8E2DE2">
      <animate attributeName="cy" values="310;-10" dur="7s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="7s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="300" r="2" opacity="0.7" fill="#FF2D95">
      <animate attributeName="cy" values="310;-10" dur="9s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="9s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="300" r="2.5" opacity="0.8">
      <animate attributeName="cy" values="310;-10" dur="5.5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="5.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Terminal prompt line -->
  <text x="500" y="105" font-family="'Courier New', monospace" font-size="18" fill="#39d353" text-anchor="middle" filter="url(#softglow)">
    ~/vedant $ whoami
  </text>

  <!-- NAME -->
  <text x="500" y="175" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="url(#aurora)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    VEDANT JAISWAL
  </text>

  <!-- Animated underline sweep -->
  <rect x="250" y="195" width="0" height="4" rx="2" fill="url(#aurora)">
    <animate attributeName="width" values="0;500;500;0" keyTimes="0;0.4;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="250;250;250;500" keyTimes="0;0.4;0.8;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="500" y="240" font-family="'Courier New', monospace" font-size="20" fill="#8b949e" text-anchor="middle" letter-spacing="2">
    AI ENGINEER  •  GENAI  •  LLMS  •  COMPUTER VISION
  </text>

  <!-- Blinking cursor -->
  <rect x="864" y="222" width="11" height="22" fill="#00D4FF">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scan line -->
  <rect x="0" y="0" width="1000" height="2" fill="#00D4FF" opacity="0.25">
    <animate attributeName="y" values="0;320;0" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets -->
  <g stroke="url(#aurora)" stroke-width="3" fill="none" filter="url(#softglow)">
    <path d="M 20 40 L 20 20 L 40 20"/>
    <path d="M 960 20 L 980 20 L 980 40"/>
    <path d="M 980 280 L 980 300 L 960 300"/>
    <path d="M 40 300 L 20 300 L 20 280"/>
  </g>
</svg>
