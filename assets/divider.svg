<svg width="1000" height="24" viewBox="0 0 1000 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E2DE2">
        <animate attributeName="stop-color" values="#8E2DE2;#00D4FF;#FF2D95;#8E2DE2" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00D4FF">
        <animate attributeName="stop-color" values="#00D4FF;#FF2D95;#8E2DE2;#00D4FF" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="dglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <line x1="0" y1="12" x2="1000" y2="12" stroke="url(#flow)" stroke-width="2" opacity="0.6"/>

  <!-- Pulse traveling along the line -->
  <circle cy="12" r="4" fill="#FFFFFF" filter="url(#dglow)">
    <animate attributeName="cx" values="-10;1010" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Center diamond -->
  <rect x="494" y="6" width="12" height="12" fill="url(#flow)" transform="rotate(45 500 12)" filter="url(#dglow)">
    <animateTransform attributeName="transform" type="rotate" from="45 500 12" to="405 500 12" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
