<svg width="1000" height="30" viewBox="0 0 1000 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD3E0"/>
      <stop offset="25%" stop-color="#C9B6E4"/>
      <stop offset="50%" stop-color="#AEE1F9"/>
      <stop offset="75%" stop-color="#B5EAD7"/>
      <stop offset="100%" stop-color="#FFDAC1"/>
    </linearGradient>
  </defs>

  <!-- Ribbon line -->
  <line x1="20" y1="15" x2="980" y2="15" stroke="url(#ribbon)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Drifting petal along the ribbon -->
  <circle cy="15" r="4.5" fill="#F8A5C2">
    <animate attributeName="cx" values="15;985" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.08;0.92;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cy="15" r="3" fill="#B39DDB">
    <animate attributeName="cx" values="985;15" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.08;0.92;1" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Center bloom -->
  <g transform="translate(500 15)">
    <g>
      <circle cx="0" cy="-6" r="4" fill="#FFD3E0"/>
      <circle cx="5.7" cy="1.9" r="4" fill="#C9B6E4"/>
      <circle cx="3.5" cy="8" r="4" fill="#AEE1F9" opacity="0.9"/>
      <circle cx="-3.5" cy="8" r="4" fill="#B5EAD7"/>
      <circle cx="-5.7" cy="1.9" r="4" fill="#FFDAC1"/>
      <circle cx="0" cy="1.5" r="3" fill="#FFF9F5"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
